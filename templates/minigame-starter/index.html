<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Nexus Mini Game Starter</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111a32;
      --line: #2a3b71;
      --text: #dbe7ff;
      --accent: #6ed6ff;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; background: radial-gradient(circle at 20% 0%, #17264f 0%, var(--bg) 60%); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
    .app { width: 100%; height: 100%; display: grid; place-items: center; padding: 12px; }
    .stage {
      width: min(100%, 480px);
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
    }
    .hud { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    #gameCanvas { width: 100%; background: #030813; border-radius: 10px; border: 1px solid #1a2a57; display: block; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    button {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #36548f;
      border-radius: 10px;
      background: #173168;
      color: #ecf4ff;
      cursor: pointer;
      font-weight: 700;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <div class="hud">
        <span id="scoreText">Score: 0</span>
        <span id="statusText">Status: Ready</span>
      </div>
      <canvas id="gameCanvas" width="420" height="640"></canvas>
      <div class="actions">
        <button id="startBtn">Start</button>
        <button id="restartBtn">Restart</button>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
