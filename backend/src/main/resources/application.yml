spring:
  application:
    name: nexus-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_platform
    username: nexus
    password: nexus_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: nexus-games

nakama:
  server-key: defaultkeychanged
  http-key: defaulthttpkeychanged
  server-url: http://localhost:7351

server:
  port: 8080
  servlet:
    context-path: /api/v1

security:
  jwt:
    # Production must override this via SECURITY_JWT_SECRET (>= 32 chars)
    secret: ${SECURITY_JWT_SECRET:change-this-in-dev-only-please-replace-with-strong-secret}
    ttl-hours: ${SECURITY_JWT_TTL_HOURS:2}
    refresh-ttl-days: ${SECURITY_JWT_REFRESH_TTL_DAYS:14}

platform:
  public-base-url: ${PLATFORM_PUBLIC_BASE_URL:http://localhost:8080/api/v1}
  cdn-base-url: ${PLATFORM_CDN_BASE_URL:}
  # local/dev recommends proxy; production with CDN/OSS can switch to redirect
  download-mode: ${PLATFORM_DOWNLOAD_MODE:proxy}
  security:
    # Set false in staging/prod to block insecure defaults at startup
    allow-insecure-defaults: ${PLATFORM_ALLOW_INSECURE_DEFAULTS:true}
  bootstrap-admin:
    enabled: ${PLATFORM_BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${PLATFORM_BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:admin123456}
    email: ${PLATFORM_BOOTSTRAP_ADMIN_EMAIL:admin@nexus.local}

logging:
  level:
    com.nexus.platform: DEBUG
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
