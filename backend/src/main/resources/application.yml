spring:
  application:
    name: nexus-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_platform
    username: nexus
    password: nexus_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: nexus-games

nakama:
  server-key: defaultkeychanged
  http-key: defaulthttpkeychanged
  server-url: http://localhost:7351

server:
  port: 8080
  servlet:
    context-path: /api/v1

platform:
  public-base-url: ${PLATFORM_PUBLIC_BASE_URL:http://localhost:8080/api/v1}
  bootstrap-admin:
    enabled: ${PLATFORM_BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${PLATFORM_BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:admin123456}
    email: ${PLATFORM_BOOTSTRAP_ADMIN_EMAIL:admin@nexus.local}

logging:
  level:
    com.nexus.platform: DEBUG
    org.springframework.web: INFO
