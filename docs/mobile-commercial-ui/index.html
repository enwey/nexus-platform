<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - 新用戶冷啟動落地頁</title>
    <style>
        :root {
            --bg-base: #090a0f;
            --bg-surface: #15161d;
            --bg-surface-elevated: #222433;
            --primary: #5c67ff;
            --primary-gradient: linear-gradient(135deg, #5c67ff 0%, #cb63ff 100%);
            --text-main: #ffffff;
            --text-muted: #8b8d99;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(21, 22, 29, 0.7);
        }

        body { background-color: #1e1e24; color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 50px; display: flex; justify-content: center; }

        .device-mockup { width: 393px; height: 852px; background: var(--bg-base); border-radius: 54px; border: 12px solid #000; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; }
        .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 125px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; }
        .status-bar { height: 50px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; z-index: 100; position: relative; }
        .page-title-label { text-align: center; color: #a1a3b3; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; position: absolute; top: 15px; width: 100%;}
        
        .content-scroll { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 120px; }
        .content-scroll::-webkit-scrollbar { display: none; }

        /* 底部導航 */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 90px; background: var(--glass-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--border-light); display: flex; justify-content: space-around; padding-top: 15px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-muted); font-size: 11px; font-weight: 500; }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 24px; height: 24px; border-radius: 8px; background: var(--text-muted); opacity: 0.5; }
        .nav-item.active .nav-icon { background: var(--primary-gradient); opacity: 1; }

        /* ================= 新用戶冷啟動特有樣式 ================= */

        /* 1. 智能替補 Hero Card */
        .resume-card { width: 100%; height: 260px; border-radius: 32px; background: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=800&q=80') center/cover; position: relative; overflow: hidden; border: 1px solid var(--border-light); margin-top: 10px; }
        .resume-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(9,10,15,0.95) 100%); padding: 24px; display: flex; flex-direction: column; justify-content: flex-end; }
        .tag-newplayer { background: linear-gradient(90deg, #ff4d4f, #ff0055); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; width: fit-content; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(255,77,79,0.4); }

        /* 2. 高級空狀態 Empty State */
        .empty-state-container { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.15); border-radius: 24px; padding: 30px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        .empty-icon { width: 64px; height: 64px; background: var(--bg-surface-elevated); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); border: 1px solid var(--border-light); }
        .empty-title { font-size: 16px; font-weight: 700; margin: 0 0 8px 0; color: #fff; }
        .empty-desc { font-size: 13px; color: var(--text-muted); margin: 0 0 20px 0; line-height: 1.5; }
        .btn-outline-glow { background: rgba(92, 103, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 10px 24px; border-radius: 16px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(92, 103, 255, 0.2); cursor: pointer; }

        /* 3. 網格列表 */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 30px; }
        .section-title { font-size: 20px; font-weight: 800; margin: 0; }
        .section-more { color: var(--primary); font-size: 14px; font-weight: 600; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 12px; }
        .game-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .game-icon { width: 100%; aspect-ratio: 1; border-radius: 18px; background: var(--bg-surface-elevated); border: 1px solid var(--border-light); background-size: cover; background-position: center; }
        .game-name { font-size: 12px; color: var(--text-muted); font-weight: 500; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

    </style>
</head>
<body>
    <div class="page-title-label" style="position:relative; top:0;">新用戶落地頁 (Cold Start)</div>
    <div class="device-mockup">
        <div class="dynamic-island"></div>
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        
        <div class="content-scroll">
            
            <!-- 策略 1：智能替補 (將「繼續遊玩」替換為「新手必玩」) -->
            <div class="resume-card">
                <div class="resume-overlay">
                    <div class="tag-newplayer">💎 新手必玩推薦</div>
                    <h2 style="font-size: 28px; margin: 0 0 4px 0;">賽博之刃：源起</h2>
                    <p style="color: rgba(255,255,255,0.7); font-size: 13px; margin: 0 0 16px 0;">動作冒險 • 240萬人正在暢玩</p>
                    <button style="background: #fff; color: #000; height: 48px; width: 140px; font-size: 15px; font-weight: 800; border-radius: 24px; border: none;">立即體驗</button>
                </div>
            </div>

            <!-- 策略 2：高級空狀態 (替代空白的「我的收藏」) -->
            <div class="section-header">
                <h3 class="section-title">我的收藏</h3>
            </div>
            <div class="empty-state-container">
                <div class="empty-icon">🎮</div>
                <h4 class="empty-title">遊戲庫還空空如也</h4>
                <p class="empty-desc">遇見喜歡的遊戲，點擊星星即可收藏到這裡，隨時隨地秒開暢玩。</p>
                <div class="btn-outline-glow">
                    <span>去發現新遊戲</span> <span>›</span>
                </div>
            </div>

            <!-- 策略 3：智能降級填補 (將「最近玩過」替換為「大家都在玩」) -->
            <div class="section-header">
                <h3 class="section-title">🔥 大家都在玩</h3>
                <span class="section-more">換一換</span>
            </div>
            <div class="game-grid">
                <div class="game-item"><div class="game-icon" style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200');"></div><div class="game-name">合成大西瓜</div></div>
                <div class="game-item"><div class="game-icon" style="background-color: #00e599;"></div><div class="game-name">動物餐廳</div></div>
                <div class="game-item"><div class="game-icon" style="background-color: #ff4d4f;"></div><div class="game-name">消消樂</div></div>
                <div class="game-item"><div class="game-icon" style="background-color: #1890ff;"></div><div class="game-name">跳一跳</div></div>
            </div>

        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active"><div class="nav-icon" style="background:var(--primary-gradient)"></div>我的庫</div>
            <div class="nav-item"><div class="nav-icon"></div>發現</div>
            <div class="nav-item"><div class="nav-icon"></div>排位</div>
            <div class="nav-item"><div class="nav-icon"></div>账号</div>
        </div>
    </div>
</body>
</html>
